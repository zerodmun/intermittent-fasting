<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <circle cx="100" cy="100" r="80" fill="#E8F5E9" />
  <!-- Clipboard board -->
  <rect x="65" y="55" width="70" height="95" rx="8" fill="#FFFFFF" stroke="#81C784" stroke-width="4" />
  <!-- Clip -->
  <rect x="85" y="48" width="30" height="12" rx="3" fill="#4CAF50" />
  <!-- Lines -->
  <line x1="80" y1="80" x2="120" y2="80" stroke="#E0E0E0" stroke-width="4" stroke-linecap="round" />
  <line x1="80" y1="95" x2="120" y2="95" stroke="#E0E0E0" stroke-width="4" stroke-linecap="round" />
  <line x1="80" y1="110" x2="105" y2="110" stroke="#E0E0E0" stroke-width="4" stroke-linecap="round" />
  <!-- Question mark signifying empty history -->
  <circle cx="120" cy="120" r="16" fill="#FF7043" />
  <text x="120" y="125" font-family="sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">?</text>
</svg>
