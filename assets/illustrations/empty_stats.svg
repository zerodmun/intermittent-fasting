<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <rect width="200" height="200" rx="30" fill="#F1F8E9" />
  <!-- Empty Chart Frame axes -->
  <line x1="45" y1="150" x2="160" y2="150" stroke="#81C784" stroke-width="4" stroke-linecap="round" />
  <line x1="45" y1="50" x2="45" y2="150" stroke="#81C784" stroke-width="4" stroke-linecap="round" />
  <!-- Dotted/dashed placeholder bars -->
  <rect x="60" y="100" width="18" height="50" rx="4" fill="none" stroke="#A5D6A7" stroke-width="3" stroke-dasharray="4 4" />
  <rect x="90" y="80" width="18" height="70" rx="4" fill="none" stroke="#A5D6A7" stroke-width="3" stroke-dasharray="4 4" />
  <rect x="120" y="115" width="18" height="35" rx="4" fill="none" stroke="#A5D6A7" stroke-width="3" stroke-dasharray="4 4" />
  <!-- Magnifying glass overlay -->
  <circle cx="130" cy="80" r="20" fill="none" stroke="#FF7043" stroke-width="4" />
  <line x1="144" y1="94" x2="160" y2="110" stroke="#FF7043" stroke-width="5" stroke-linecap="round" />
</svg>
