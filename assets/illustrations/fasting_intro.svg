    <circle cx="150" cy="85" r="2" fill="#FFFFFF" />
    <circle cx="165" cy="105" r="1.5" fill="#FFFFFF" />
    <circle cx="138" cy="120" r="2" fill="#FFFFFF" />
  </g>
  <!-- Connection arrow -->
