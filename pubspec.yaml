name: fast_flow
description: A modern intermittent fasting tracker — offline-first, beautiful, production-ready.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  state_notifier: ^1.0.0
  go_router: ^17.2.3
  hive_ce: ^2.19.1
  hive_ce_flutter: ^2.3.4
  flutter_local_notifications: ^18.0.0
  fl_chart: ^1.2.0
  shared_preferences: ^2.5.0
  intl: ^0.20.0
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  table_calendar: ^3.2.0
  path_provider: ^2.1.5
  timezone: ^0.10.1
  flutter_svg: ^2.0.10-ap.1
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.15.1
  hive_ce_generator: ^1.11.2
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/illustrations/
    - assets/branding/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/branding/icon_foreground.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"
  monochrome_icon: "assets/branding/monochrome_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"
  image: "assets/branding/logo.png"
  android_12:
    image: "assets/branding/icon_foreground.png"
    color: "#FFFFFF"
    color_dark: "#121212"
  fullscreen: true
